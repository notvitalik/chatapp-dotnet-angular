<section class="panel messages">
  <header>
    <h2>Messages</h2>
  </header>

  <div class="message-stack">
    @for (message of messages; track message.content) {
      <article class="message-item">
        <strong>{{ message.sender }}</strong>
        <p>{{ message.content }}</p>
      </article>
    }
  </div>
</section>
